<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilo.css " />
</head>
<body>
  <header>
    <img src="img/Attack.png" alt="Logo Attack on Titan" class="logo" />
    <p class="subtitulo">Los 9 Titanes Poderosos</p>
  </header>


  <main id="contenedor-titanes">
    <p class="cargando">Cargando titanes...</p>
  </main>


  <template id="template-titan">
    <article class="titan-card">
      <img class="titan-img" src="" alt="" />
      <div class="titan-info">
        <div class="titan-id"></div>
        <h2 class="titan-nombre"></h2>
        <p class="titan-detalle">ALTURA: <span class="titan-altura"></span></p>
        <p class="titan-detalle">ALIANZAa: <span class="titan-alianza"></span></p>
        <p class="titan-detalle">HEREDERO ACTUAL: <span class="titan-heredero-actual"></span></p>
        <p class="titan-detalle"> HEREDEROS ANTERIORES: <span class="titan-herederos-pasados"></span></p>
        <div class="titan-habilidades">
          <h4>HABILIDADES</h4>
          <ul class="lista-habilidades"></ul>
        </div>
      </div>
    </article>
  </template>


  <footer>
    <p>Datos obtenidos de <strong>attackontitanapi.com</strong></p>
  </footer>


  <script src="app.js"></script>
</body>
</html>
